services:
  php-web:
    build:
      context: .
      target: php-web
    expose:
      - "80"
    volumes:
      - ./:/var/www/html
    environment:
      - PYTHON_API_URL=http://python-api:8000/analyze
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.5-flash}
    depends_on:
      - python-api
    restart: always

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    environment:
      - APP_DOMAIN=${APP_DOMAIN:-vps.ikkyosai.com}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - php-web
    restart: always

  python-api:
    build:
      context: .
      target: python-api
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.5-flash}
    volumes:
      - ./:/app
    restart: always

volumes:
  caddy_data:
  caddy_config:
