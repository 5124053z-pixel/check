version: '3.8'

services:
  php-web:
    build:
      context: .
      target: php-web
    ports:
      - "80:80"
    volumes:
      - ./:/var/www/html
    environment:
      - PYTHON_API_URL=http://python-api:8000/analyze
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      - python-api
    restart: always

  python-api:
    build:
      context: .
      target: python-api
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - ./:/app
    restart: always
